name: CD Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  pre-deploy-validation:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_cd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_cd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_cd
      API_PORT: 3001
      SESSION_SECRET: cd-session-secret
      JWT_SECRET: cd-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_ACCESS_SECRET: cd-jwt-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      GOOGLE_CLIENT_ID: 1234567890-cd.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: cd-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy validation pipeline script
        run: bash infrastructure/scripts/ci/pre-deploy-validation.sh

  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_BASE: /${{ github.event.repository.name }}/
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy frontend env
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "Missing required repository variable: VITE_API_BASE_URL"
            echo "Set it in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

          if [[ "${VITE_API_BASE_URL}" == http://localhost* || "${VITE_API_BASE_URL}" == https://localhost* ]]; then
            echo "VITE_API_BASE_URL cannot target localhost for GitHub Pages deployments."
            exit 1
          fi

      - name: Run frontend release checks
        run: bash infrastructure/scripts/ci/frontend-release-checks.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
