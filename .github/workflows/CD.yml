# Canonical workflow name; keep aligned with branch protection and docs.
name: CD Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Promotion target for this release run
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
          - production
      run_migrations:
        description: Run remote database migrations before deploy validation
        required: false
        type: boolean
        default: false
      skip_hosted_smoke:
        description: Skip hosted smoke checks for this release run
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cd-deployment-${{ github.event.inputs.target_environment || 'development' }}
  cancel-in-progress: false

jobs:
  pre-deploy-validation:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_cd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_cd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_cd
      API_PORT: 3001
      API_BASE_URL: http://localhost:5173
      APP_URL: http://localhost:5173
      SESSION_SECRET: cd-session-secret
      JWT_SECRET: cd-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_ACCESS_SECRET: cd-jwt-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      GOOGLE_CLIENT_ID: 1234567890-cd.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: cd-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5173/api/auth/google/callback
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy validation pipeline script
        run: bash infrastructure/scripts/ci/pre-deploy-validation.sh

  release-manifest:
    name: Release Manifest
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation]
    env:
      CD_TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate release manifest
        run: npm run ci:release:manifest

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: tmp/ci/release/release-manifest.*

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, release-manifest]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'development')
    environment: development
    env:
      CD_TARGET_ENV: development
      CD_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.CD_FRONTEND_DEPLOY_HOOK_URL }}
      CD_FRONTEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_FRONTEND_DEPLOY_HOOK_METHOD }}
      CD_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.CD_BACKEND_DEPLOY_HOOK_URL }}
      CD_BACKEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_BACKEND_DEPLOY_HOOK_METHOD }}
      CD_DEPLOY_APP_URL: ${{ vars.CD_DEPLOY_APP_URL }}
      CD_DEPLOY_API_HEALTH_URL: ${{ vars.CD_DEPLOY_API_HEALTH_URL }}
      CD_DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.CD_DEPLOY_FRONTEND_HEALTH_URL }}
      CD_DEPLOY_OAUTH_ENTRY_URL: ${{ vars.CD_DEPLOY_OAUTH_ENTRY_URL }}
      CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL: ${{ vars.CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL }}
      CD_DEPLOY_EXPECTED_API_BASE_URL: ${{ vars.CD_DEPLOY_EXPECTED_API_BASE_URL }}
      CD_DEPLOY_EXPECTED_API_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_API_RELEASE_VERSION }}
      CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION }}
      CD_RELEASE_SMOKE_TIMEOUT_MS: ${{ vars.CD_RELEASE_SMOKE_TIMEOUT_MS }}
      CD_RELEASE_SMOKE_INTERVAL_MS: ${{ vars.CD_RELEASE_SMOKE_INTERVAL_MS }}
      CD_SYNTHETIC_USER_EMAIL: ${{ secrets.CD_SYNTHETIC_USER_EMAIL }}
      CD_SYNTHETIC_USER_PASSWORD: ${{ secrets.CD_SYNTHETIC_USER_PASSWORD }}
      CD_SYNTHETIC_EXPECTED_USER_ROLE: ${{ vars.CD_SYNTHETIC_EXPECTED_USER_ROLE }}
      CD_SYNTHETIC_CONFIRM_RETRIES: ${{ vars.CD_SYNTHETIC_CONFIRM_RETRIES }}
      CD_SYNTHETIC_RETRY_INTERVAL_MS: ${{ vars.CD_SYNTHETIC_RETRY_INTERVAL_MS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies for migration flow
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == 'true' }}
        run: npm ci

      - name: Run database migrations
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == 'true' }}
        run: npm run db:migrate --workspace=ecotrack-database

      - name: Trigger deploy hooks
        run: npm run ci:release:deploy-hooks

      - name: Run hosted release smoke checks
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_hosted_smoke == 'true') }}
        run: npm run ci:release:smoke

      - name: Run hosted synthetic monitoring checks
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_hosted_smoke == 'true') }}
        run: npm run ci:synthetic

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-development
          path: |
            tmp/ci/release
            tmp/ci/synthetic

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          if [ -f tmp/ci/release/deploy-hooks.development.md ]; then
            cat tmp/ci/release/deploy-hooks.development.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/release/release-smoke.development.md ]; then
            cat tmp/ci/release/release-smoke.development.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release Smoke"
              echo ""
              echo "- Hosted smoke skipped by workflow input."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/synthetic/synthetic-monitoring.development.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat tmp/ci/synthetic/synthetic-monitoring.development.md >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, release-manifest]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'staging' }}
    environment: staging
    env:
      CD_TARGET_ENV: staging
      CD_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.CD_FRONTEND_DEPLOY_HOOK_URL }}
      CD_FRONTEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_FRONTEND_DEPLOY_HOOK_METHOD }}
      CD_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.CD_BACKEND_DEPLOY_HOOK_URL }}
      CD_BACKEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_BACKEND_DEPLOY_HOOK_METHOD }}
      CD_DEPLOY_APP_URL: ${{ vars.CD_DEPLOY_APP_URL }}
      CD_DEPLOY_API_HEALTH_URL: ${{ vars.CD_DEPLOY_API_HEALTH_URL }}
      CD_DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.CD_DEPLOY_FRONTEND_HEALTH_URL }}
      CD_DEPLOY_OAUTH_ENTRY_URL: ${{ vars.CD_DEPLOY_OAUTH_ENTRY_URL }}
      CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL: ${{ vars.CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL }}
      CD_DEPLOY_EXPECTED_API_BASE_URL: ${{ vars.CD_DEPLOY_EXPECTED_API_BASE_URL }}
      CD_DEPLOY_EXPECTED_API_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_API_RELEASE_VERSION }}
      CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION }}
      CD_RELEASE_SMOKE_TIMEOUT_MS: ${{ vars.CD_RELEASE_SMOKE_TIMEOUT_MS }}
      CD_RELEASE_SMOKE_INTERVAL_MS: ${{ vars.CD_RELEASE_SMOKE_INTERVAL_MS }}
      CD_SYNTHETIC_USER_EMAIL: ${{ secrets.CD_SYNTHETIC_USER_EMAIL }}
      CD_SYNTHETIC_USER_PASSWORD: ${{ secrets.CD_SYNTHETIC_USER_PASSWORD }}
      CD_SYNTHETIC_EXPECTED_USER_ROLE: ${{ vars.CD_SYNTHETIC_EXPECTED_USER_ROLE }}
      CD_SYNTHETIC_CONFIRM_RETRIES: ${{ vars.CD_SYNTHETIC_CONFIRM_RETRIES }}
      CD_SYNTHETIC_RETRY_INTERVAL_MS: ${{ vars.CD_SYNTHETIC_RETRY_INTERVAL_MS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies for migration flow
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: npm ci

      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: npm run db:migrate --workspace=ecotrack-database

      - name: Trigger deploy hooks
        run: npm run ci:release:deploy-hooks

      - name: Run hosted release smoke checks
        if: ${{ github.event.inputs.skip_hosted_smoke != 'true' }}
        run: npm run ci:release:smoke

      - name: Run hosted synthetic monitoring checks
        if: ${{ github.event.inputs.skip_hosted_smoke != 'true' }}
        run: npm run ci:synthetic

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-staging
          path: |
            tmp/ci/release
            tmp/ci/synthetic

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          if [ -f tmp/ci/release/deploy-hooks.staging.md ]; then
            cat tmp/ci/release/deploy-hooks.staging.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/release/release-smoke.staging.md ]; then
            cat tmp/ci/release/release-smoke.staging.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release Smoke"
              echo ""
              echo "- Hosted smoke skipped by workflow input."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/synthetic/synthetic-monitoring.staging.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat tmp/ci/synthetic/synthetic-monitoring.staging.md >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, release-manifest]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'production' }}
    environment: production
    env:
      CD_TARGET_ENV: production
      CD_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.CD_FRONTEND_DEPLOY_HOOK_URL }}
      CD_FRONTEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_FRONTEND_DEPLOY_HOOK_METHOD }}
      CD_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.CD_BACKEND_DEPLOY_HOOK_URL }}
      CD_BACKEND_DEPLOY_HOOK_METHOD: ${{ vars.CD_BACKEND_DEPLOY_HOOK_METHOD }}
      CD_DEPLOY_APP_URL: ${{ vars.CD_DEPLOY_APP_URL }}
      CD_DEPLOY_API_HEALTH_URL: ${{ vars.CD_DEPLOY_API_HEALTH_URL }}
      CD_DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.CD_DEPLOY_FRONTEND_HEALTH_URL }}
      CD_DEPLOY_OAUTH_ENTRY_URL: ${{ vars.CD_DEPLOY_OAUTH_ENTRY_URL }}
      CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL: ${{ vars.CD_DEPLOY_EXPECTED_OAUTH_CALLBACK_URL }}
      CD_DEPLOY_EXPECTED_API_BASE_URL: ${{ vars.CD_DEPLOY_EXPECTED_API_BASE_URL }}
      CD_DEPLOY_EXPECTED_API_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_API_RELEASE_VERSION }}
      CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION: ${{ vars.CD_DEPLOY_EXPECTED_FRONTEND_RELEASE_VERSION }}
      CD_RELEASE_SMOKE_TIMEOUT_MS: ${{ vars.CD_RELEASE_SMOKE_TIMEOUT_MS }}
      CD_RELEASE_SMOKE_INTERVAL_MS: ${{ vars.CD_RELEASE_SMOKE_INTERVAL_MS }}
      CD_SYNTHETIC_USER_EMAIL: ${{ secrets.CD_SYNTHETIC_USER_EMAIL }}
      CD_SYNTHETIC_USER_PASSWORD: ${{ secrets.CD_SYNTHETIC_USER_PASSWORD }}
      CD_SYNTHETIC_EXPECTED_USER_ROLE: ${{ vars.CD_SYNTHETIC_EXPECTED_USER_ROLE }}
      CD_SYNTHETIC_CONFIRM_RETRIES: ${{ vars.CD_SYNTHETIC_CONFIRM_RETRIES }}
      CD_SYNTHETIC_RETRY_INTERVAL_MS: ${{ vars.CD_SYNTHETIC_RETRY_INTERVAL_MS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies for migration flow
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: npm ci

      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: npm run db:migrate --workspace=ecotrack-database

      - name: Trigger deploy hooks
        run: npm run ci:release:deploy-hooks

      - name: Run hosted release smoke checks
        if: ${{ github.event.inputs.skip_hosted_smoke != 'true' }}
        run: npm run ci:release:smoke

      - name: Run hosted synthetic monitoring checks
        if: ${{ github.event.inputs.skip_hosted_smoke != 'true' }}
        run: npm run ci:synthetic

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-production
          path: |
            tmp/ci/release
            tmp/ci/synthetic

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          if [ -f tmp/ci/release/deploy-hooks.production.md ]; then
            cat tmp/ci/release/deploy-hooks.production.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/release/release-smoke.production.md ]; then
            cat tmp/ci/release/release-smoke.production.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release Smoke"
              echo ""
              echo "- Hosted smoke skipped by workflow input."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tmp/ci/synthetic/synthetic-monitoring.production.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat tmp/ci/synthetic/synthetic-monitoring.production.md >> "$GITHUB_STEP_SUMMARY"
          fi

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [release-manifest, deploy-development, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Publish release orchestration summary
        shell: bash
        run: |
          {
            echo "## CD summary"
            echo "- Release manifest: ${{ needs.release-manifest.result }}"
            echo "- Development: ${{ needs.deploy-development.result }}"
            echo "- Staging: ${{ needs.deploy-staging.result }}"
            echo "- Production: ${{ needs.deploy-production.result }}"
            echo ""
            echo "Rollback path:"
            echo "- Re-run \`CD Deployment\` from the previous known-good git ref and the same target environment."
            echo "- Run database migrations only when the rollback target still needs forward-only schema alignment."
            echo "- If schema or data reversal is required, restore Neon before reopening traffic."
            echo ""
            echo "GitHub Pages docs publishing remains separate in \`.github/workflows/docs-pages.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"
