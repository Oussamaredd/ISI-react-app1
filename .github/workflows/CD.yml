name: Release Readiness

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-deploy-validation:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_cd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_cd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_cd
      API_PORT: 3001
      API_BASE_URL: http://localhost:5173
      APP_URL: http://localhost:5173
      SESSION_SECRET: cd-session-secret
      JWT_SECRET: cd-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_ACCESS_SECRET: cd-jwt-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      GOOGLE_CLIENT_ID: 1234567890-cd.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: cd-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5173/api/auth/google/callback
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy validation pipeline script
        run: bash infrastructure/scripts/ci/pre-deploy-validation.sh

  pages-reserved-for-docs:
    name: GitHub Pages Reserved For Docs
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation]
    steps:
      - name: Confirm GitHub Pages app retirement
        run: |
          echo "GitHub Pages is retired as the EcoTrack app host."
          echo "Future GitHub Pages use is reserved for docs-only follow-up work."
          echo "Cloudflare Pages will be introduced in a later rollout phase."
