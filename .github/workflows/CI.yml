name: CI Integration

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate env policies and templates
        run: npm run validate-env:all

      - name: Validate CDC traceability matrix and executable specs contracts
        run: npm run validate-specs

      - name: Enforce architecture lint rules
        run: npm run lint

  database:
    name: Database CI
    runs-on: ubuntu-latest
    needs: [architecture]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build database workspace
        run: npm run build --workspace=ecotrack-database

      - name: Typecheck database workspace
        run: npm run typecheck --workspace=ecotrack-database

      - name: Run database migrations
        run: npm run db:migrate --workspace=ecotrack-database

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [architecture]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=ecotrack-app

      - name: Run frontend key-journey E2E tests
        run: npm run test:e2e --workspace=ecotrack-app

      - name: Run frontend realtime transport release gate
        run: npm run test:realtime --workspace=ecotrack-app

      - name: Test frontend (Vitest)
        run: npm run test:coverage --workspace=ecotrack-app

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/coverage

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [architecture, database]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_ci
      API_PORT: 3001
      API_BASE_URL: http://localhost:5173
      APP_URL: http://localhost:5173
      SESSION_SECRET: ci-session-secret
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_ACCESS_SECRET: ci-jwt-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      GOOGLE_CLIENT_ID: 1234567890-ci.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5173/api/auth/google/callback
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build database workspace for backend dependency
        run: npm run build --workspace=ecotrack-database

      - name: Typecheck backend
        run: npm run typecheck --workspace=ecotrack-api

      - name: Migrate database before backend tests
        run: npm run db:migrate --workspace=ecotrack-database

      - name: Test backend against migrated DB (Vitest)
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=2
          attempt=1
          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "[backend-ci] Running backend tests (attempt $attempt/$max_attempts)"
            output_file="$(mktemp)"
            if npm run test --workspace=ecotrack-api 2>&1 | tee "$output_file"; then
              rm -f "$output_file"
              exit 0
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "[backend-ci] Backend tests failed after $max_attempts attempts"
              tail -n 120 "$output_file" > /tmp/backend-ci-tail.log || true
              escaped_tail="$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' /tmp/backend-ci-tail.log)"
              echo "::error title=Backend Vitest failure::$escaped_tail"
              exit 1
            fi

            echo "[backend-ci] Retrying after transient failure..."
            sleep 5
            attempt=$((attempt + 1))
          done

      - name: Collect backend coverage (best effort)
        continue-on-error: true
        run: npm run test:coverage --workspace=ecotrack-api

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage

  sonar-gate:
    name: Sonar Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check SonarQube configuration
        id: check
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -n "${SONAR_TOKEN}" && -n "${SONAR_HOST_URL}" ]]; then
            sonar_probe_url="${SONAR_HOST_URL%/}/api/server/version"
            if curl --silent --show-error --fail --max-time 10 "$sonar_probe_url" > /dev/null; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "Skipping SonarQube Analysis because SONAR_HOST_URL is unreachable from this runner."
            fi
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping SonarQube Analysis because SONAR_TOKEN or SONAR_HOST_URL is not configured."
          fi

  sonar:
    name: SonarQube Analysis
    if: ${{ needs.sonar-gate.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    needs: [frontend, backend, sonar-gate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: app/coverage

      - name: Download backend coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: Run SonarQube Analysis
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          sonar-scanner \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}"
