name: CI Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      api: ${{ steps.filter.outputs.api }}
      database: ${{ steps.filter.outputs.database }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      ci: ${{ steps.filter.outputs.ci }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            app:
              - 'app/**'
            api:
              - 'api/**'
            database:
              - 'database/**'
            infrastructure:
              - 'infrastructure/**'
            ci:
              - '.github/workflows/**'
            root:
              - 'package.json'
              - 'package-lock.json'
              - 'AGENTS.md'
              - 'sonar-project.properties'

  preflight:
    name: Preflight - CDC Contracts and Architecture
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate env policies and templates
        run: npm run validate-env:all

      - name: CDC Contracts - validate traceability matrix
        run: npm run validate-specs

      - name: Architecture boundaries lint
        run: npm run lint

      - name: Generate CDC evidence summary artifact
        run: node infrastructure/scripts/ci/generate-cdc-summary.mjs

      - name: Upload CDC evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: cdc-summary
          path: |
            tmp/ci/cdc-summary.json
            tmp/ci/cdc-summary.md

  database:
    name: Database CI
    runs-on: ubuntu-latest
    needs: [changes, preflight]
    if: >-
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.infrastructure == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.root == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build database workspace
        run: npm run build --workspace=ecotrack-database

      - name: Typecheck database workspace
        run: npm run typecheck --workspace=ecotrack-database

      - name: Run database migrations
        run: npm run db:migrate --workspace=ecotrack-database

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [changes, preflight]
    if: >-
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.infrastructure == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.root == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck --workspace=ecotrack-app

      - name: Frontend key-journey E2E tests
        run: npm run test:e2e --workspace=ecotrack-app

      - name: Realtime Contract Gate
        run: npm run test:realtime --workspace=ecotrack-app

      - name: Frontend coverage tests
        run: npm run test:coverage --workspace=ecotrack-app

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/coverage

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [changes, preflight, database]
    if: >-
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.infrastructure == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.root == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketdb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketdb_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketdb_ci
      API_PORT: 3001
      API_BASE_URL: http://localhost:5173
      APP_URL: http://localhost:5173
      SESSION_SECRET: ci-session-secret
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_ACCESS_SECRET: ci-jwt-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      GOOGLE_CLIENT_ID: 1234567890-ci.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5173/api/auth/google/callback
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck --workspace=ecotrack-api

      - name: Migrate database before backend tests
        run: npm run db:migrate --workspace=ecotrack-database

      - name: Backend tests
        run: npm run test --workspace=ecotrack-api

      - name: Backend coverage tests
        run: npm run test:coverage --workspace=ecotrack-api

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [changes, preflight]
    if: >-
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.infrastructure == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.root == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image using infrastructure Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/Dockerfile
          push: false
          load: false

  sonar-gate:
    name: SonarCloud Gate
    runs-on: ubuntu-latest
    needs: [changes, frontend, backend]
    if: >-
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.root == 'true'
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check SonarCloud configuration
        id: check
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -n "${SONAR_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Skipping SonarCloud analysis because SONAR_TOKEN is missing."

  sonar:
    name: SonarCloud Analysis and Quality Gate
    if: ${{ needs.sonar-gate.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    needs: [sonar-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: app/coverage

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
