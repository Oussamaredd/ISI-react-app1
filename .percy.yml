version: 2
snapshot:
  widths:
    - 375
    - 768
    - 1280
    - 1440
  min-height: 1024
  percy-css: |
    [data-percy-ignore],
    .auth-status-spinner,
    .auth-inline-spinner,
    .ops-status[aria-live="polite"] {
      visibility: hidden !important;
    }
discovery:
  allowed-hostnames:
    - 127.0.0.1
  network-idle-timeout: 750
  disable-cache: false
