openapi: 3.1.0
info:
  title: EcoTrack Domain Modules Reference
  version: 0.2.0
  description: Reference index for post-Sprint 0 EcoTrack domain endpoints.
servers:
  - url: /api
    description: Browser-facing edge-relative API base
paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user profile and optional zone assignment context
      responses:
        '200':
          description: Authenticated user payload with role and optional zone/depot metadata
  /containers:
    get:
      tags: [Containers]
      summary: List mapped containers with optional zone filtering and pagination
      parameters:
        - in: query
          name: zoneId
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated container listing with pagination metadata
    post:
      tags: [Containers]
      summary: Create a mapped container with required coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, label, latitude, longitude]
              properties:
                code:
                  type: string
                label:
                  type: string
                status:
                  type: string
                fillLevelPercent:
                  type: integer
                  minimum: 0
                  maximum: 100
                zoneId:
                  type: string
                  format: uuid
                containerTypeId:
                  type: string
                  format: uuid
                latitude:
                  type: string
                longitude:
                  type: string
      responses:
        '201':
          description: Container created
  /zones:
    post:
      tags: [Zones]
      summary: Create an operational zone with a required depot/start location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code, depotLabel, depotLatitude, depotLongitude]
              properties:
                name:
                  type: string
                code:
                  type: string
                description:
                  type: string
                depotLabel:
                  type: string
                depotLatitude:
                  type: string
                depotLongitude:
                  type: string
      responses:
        '201':
          description: Zone created
  /citizen/reports:
    post:
      tags: [Citizen]
      summary: Submit a citizen container issue report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [containerId, reportType]
              properties:
                containerId:
                  type: string
                  format: uuid
                reportType:
                  type: string
                  enum: [container_full, damaged_container, access_blocked, general_issue]
                description:
                  type: string
                  maxLength: 500
                photoUrl:
                  type: string
                latitude:
                  type: string
                longitude:
                  type: string
      responses:
        '201':
          description: Citizen report accepted
  /citizen/profile:
    get:
      tags: [Citizen]
      summary: Get citizen profile with gamification summary
      responses:
        '200':
          description: Citizen profile payload
  /citizen/challenges:
    get:
      tags: [Citizen]
      summary: List available and enrolled challenges
      responses:
        '200':
          description: Challenge list
  /tours/agent/me:
    get:
      tags: [Tours]
      summary: Get the assigned tour for the authenticated agent, including depot and routed stops
      responses:
        '200':
          description: Agent tour payload with ordered stops, depot, and persisted route geometry
  /tours/{tourId}/stops/{stopId}/validate:
    post:
      tags: [Tours]
      summary: Validate collection at a tour stop
      parameters:
        - in: path
          name: tourId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: stopId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Validation persisted and next stop computed
  /planning/optimize-tour:
    post:
      tags: [Planning]
      summary: Generate a capped four-stop optimized route by zone, threshold, and depot-aware route anchor
      responses:
        '200':
          description: Route candidate payload with metrics, applied optimization stages, and optional startLocation
  /planning/create-tour:
    post:
      tags: [Planning]
      summary: Create a planned four-stop tour for one zone with zone-safe agent assignment
      responses:
        '200':
          description: Created tour payload
  /planning/agents:
    get:
      tags: [Planning]
      summary: List active agents with their current zone assignments
      responses:
        '200':
          description: Agent roster with zone metadata
  /planning/reports/generate:
    post:
      tags: [Planning]
      summary: Generate manager report for selected period and KPIs
      responses:
        '201':
          description: Report generation accepted
  /tickets/support/categories:
    get:
      tags: [Support]
      summary: List EcoTrack support categories and chatbot contract metadata
      responses:
        '200':
          description: Support category catalog
  /admin/settings/notifications/test:
    post:
      tags: [Admin]
      summary: Dispatch test notification using active channel/template settings
      responses:
        '201':
          description: Test notification queued
  /analytics/summary:
    get:
      tags: [Analytics]
      summary: Retrieve EcoTrack KPI summary
      responses:
        '200':
          description: Summary counters
  /analytics/zones/current:
    get:
      tags: [Analytics]
      summary: Retrieve the latest persisted current-state analytics by zone
      parameters:
        - in: query
          name: zoneId
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Zone current-state payload
  /analytics/zones/aggregates:
    get:
      tags: [Analytics]
      summary: Retrieve recent 10-minute zone aggregate analytics
      parameters:
        - in: query
          name: zoneId
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Zone aggregate payload
