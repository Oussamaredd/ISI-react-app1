groups:
  - name: ecotrack.reliability.slo
    rules:
      - record: job:ecotrack_api:http_5xx_ratio:rate5m
        expr: |
          sum(rate(ecotrack_http_request_status_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(ecotrack_http_request_status_total[5m])), 0.001)

      - record: job:ecotrack_api:http_5xx_ratio:rate30m
        expr: |
          sum(rate(ecotrack_http_request_status_total{status_code=~"5.."}[30m]))
          /
          clamp_min(sum(rate(ecotrack_http_request_status_total[30m])), 0.001)

      - record: job:ecotrack_api:http_5xx_ratio:rate1h
        expr: |
          sum(rate(ecotrack_http_request_status_total{status_code=~"5.."}[1h]))
          /
          clamp_min(sum(rate(ecotrack_http_request_status_total[1h])), 0.001)

      - record: job:ecotrack_api:http_5xx_ratio:rate6h
        expr: |
          sum(rate(ecotrack_http_request_status_total{status_code=~"5.."}[6h]))
          /
          clamp_min(sum(rate(ecotrack_http_request_status_total[6h])), 0.001)

      - record: job:ecotrack_api:http_success_ratio:rate30m
        expr: 1 - job:ecotrack_api:http_5xx_ratio:rate30m

      - record: job:ecotrack_api:http_5xx_burn_rate:5m
        expr: job:ecotrack_api:http_5xx_ratio:rate5m / 0.01

      - record: job:ecotrack_api:http_5xx_burn_rate:30m
        expr: job:ecotrack_api:http_5xx_ratio:rate30m / 0.01

      - record: job:ecotrack_api:http_5xx_burn_rate:1h
        expr: job:ecotrack_api:http_5xx_ratio:rate1h / 0.01

      - record: job:ecotrack_api:http_5xx_burn_rate:6h
        expr: job:ecotrack_api:http_5xx_ratio:rate6h / 0.01

      - record: job:ecotrack_api:http_p95_latency_ms:5m
        expr: histogram_quantile(0.95, sum by (le) (rate(ecotrack_http_request_duration_ms_bucket[5m])))

      - alert: EcoTrackApiErrorBudgetBurnFast
        expr: job:ecotrack_api:http_5xx_burn_rate:5m > 14.4 and job:ecotrack_api:http_5xx_burn_rate:1h > 14.4
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "API error budget is burning too fast"
          description: "The 1 percent 5xx-error budget is burning more than 14.4x faster than allowed across both 5-minute and 1-hour windows."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackApiErrorBudgetBurnSlow
        expr: job:ecotrack_api:http_5xx_burn_rate:30m > 6 and job:ecotrack_api:http_5xx_burn_rate:6h > 6
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API error budget burn is elevated"
          description: "The 1 percent 5xx-error budget is burning more than 6x faster than allowed across both 30-minute and 6-hour windows."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

  - name: ecotrack.api.core
    rules:
      - alert: EcoTrackApiDown
        expr: up{job="ecotrack-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "EcoTrack API metrics target is down"
          description: "Prometheus cannot scrape the EcoTrack API metrics endpoint for more than 1 minute."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackApiP95LatencyHigh
        expr: job:ecotrack_api:http_p95_latency_ms:5m > 500
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API latency p95 is above 500ms"
          description: "The 95th percentile API latency has stayed above 500ms for 10 minutes."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackApi5xxRateHigh
        expr: sum(rate(ecotrack_http_request_errors_total{status_class="5xx"}[5m])) > 0.05
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High 5xx error rate on the API"
          description: "The EcoTrack API is returning more than 0.05 server errors per second for 10 minutes."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackObservabilitySnapshotDown
        expr: ecotrack_observability_snapshot_up == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "DB-backed observability snapshot collection is failing"
          description: "The monitoring service cannot collect DB-backed operational gauges."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

  - name: ecotrack.iot.pipeline
    rules:
      - alert: EcoTrackIotBackpressureActive
        expr: ecotrack_iot_backpressure_active == 1
        for: 5m
        labels:
          severity: critical
          team: iot
        annotations:
          summary: "IoT ingestion backpressure is active"
          description: "The staged-ingestion backlog crossed the configured backpressure threshold and new requests are being rejected."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackIotIngestionBacklogHigh
        expr: ecotrack_iot_ingestion_backlog_total > 5000
        for: 10m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "IoT staged-event backlog is high"
          description: "Pending, retry, or processing staged ingestion events exceeded 5000 for 10 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackIotIngestionQueueAgeHigh
        expr: ecotrack_iot_ingestion_oldest_pending_age_ms > 300000
        for: 10m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Oldest staged ingestion event is stale"
          description: "The oldest runnable staged ingestion event has been waiting for more than 5 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackIotIngestionFailuresPresent
        expr: ecotrack_iot_ingestion_events{status="failed"} > 0
        for: 10m
        labels:
          severity: critical
          team: iot
        annotations:
          summary: "Failed staged ingestion events are present"
          description: "One or more staged ingestion events have exhausted retries and remain failed."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackValidatedDeliveryBacklogHigh
        expr: ecotrack_iot_validated_delivery_backlog_total > 5000
        for: 10m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Validated delivery backlog is high"
          description: "Pending, retry, or processing validated-event deliveries exceeded 5000 for 10 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackValidatedDeliveryQueueAgeHigh
        expr: ecotrack_iot_validated_delivery_oldest_pending_age_ms > 300000
        for: 10m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Oldest validated-event delivery is stale"
          description: "The oldest runnable validated-event delivery has been waiting for more than 5 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackValidatedDeliveryFailuresPresent
        expr: ecotrack_iot_validated_delivery_events{status="failed"} > 0
        for: 10m
        labels:
          severity: critical
          team: iot
        annotations:
          summary: "Failed validated-event deliveries are present"
          description: "One or more validated-event deliveries have exhausted retries and remain failed."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackEventConnectorBacklogHigh
        expr: ecotrack_event_connector_backlog_total > 1000
        for: 10m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Event connector backlog is high"
          description: "Pending, retry, or processing event-connector exports exceeded 1000 for 10 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackEventConnectorFailuresPresent
        expr: ecotrack_event_connector_exports{status="failed"} > 0
        for: 10m
        labels:
          severity: critical
          team: iot
        annotations:
          summary: "Failed event connector exports are present"
          description: "One or more event-connector exports have exhausted retries and remain failed."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackInternalConsumerLagHigh
        expr: ecotrack_internal_consumer_lag_oldest_pending_age_ms > 300000
        for: 5m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Internal consumer lag is above 5 minutes"
          description: "One or more internal validated-event consumers have had pending work waiting longer than 5 minutes."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackInternalConsumerImbalanceHigh
        expr: ecotrack_internal_consumer_lag_messages > (avg(ecotrack_internal_consumer_lag_messages) * 2) and ecotrack_internal_consumer_lag_messages > 250
        for: 5m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "One internal consumer is falling materially behind"
          description: "A validated-event consumer backlog is more than double the peer average and above 250 queued deliveries."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

      - alert: EcoTrackInternalConsumerShardSkewHigh
        expr: ecotrack_internal_consumer_lag_shard_skew > 250
        for: 5m
        labels:
          severity: warning
          team: iot
        annotations:
          summary: "Internal consumer shard skew is high"
          description: "One validated-event consumer has materially uneven shard backlog distribution."
          runbook: "docs/operations/runbooks/IOT_EVENT_REPLAY_AND_ALERTING.md"

  - name: ecotrack.operational.state
    rules:
      - alert: EcoTrackCriticalContainerFillPresent
        expr: ecotrack_containers_fill_total{status="critical"} > 0
        for: 5m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Critical-fill containers detected"
          description: "At least one container is in critical fill state for more than 5 minutes."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackContainerMaxFillAboveNinety
        expr: ecotrack_containers_max_fill_percent > 90
        for: 10m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Container fill level above 90 percent"
          description: "The highest observed container fill level is above 90 percent."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackCriticalAlertEventsOpen
        expr: ecotrack_alert_events_open_total{severity="critical"} > 0
        for: 5m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Critical alert events remain open"
          description: "There are persisted critical alert events that remain open."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

  - name: ecotrack.frontend.realtime
    rules:
      - alert: FrontendErrorIngestionSpike
        expr: rate(frontend_errors_total[5m]) > 0.2
        for: 10m
        labels:
          severity: warning
          team: frontend
        annotations:
          summary: "High frontend error ingestion rate"
          description: "Frontend error ingestion rate is above 0.2 events per second for 10 minutes."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: RealtimeWebSocketAuthFailuresHigh
        expr: increase(ecotrack_realtime_connection_events_total{transport="ws",action="auth_failure"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High WebSocket auth failure rate"
          description: "WebSocket realtime auth failures exceeded 20 in a 10-minute window."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

  - name: ecotrack.security.baseline
    rules:
      - alert: EcoTrackAuthorizationDeniedSpike
        expr: increase(ecotrack_http_request_status_total{status_code="403"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "403 authorization denials are spiking"
          description: "Authorization-denied responses exceeded 20 in a rolling 10-minute window."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"

      - alert: EcoTrackLoginFailuresHigh
        expr: increase(ecotrack_security_signals_total{signal="login_failure"}[10m]) > 10
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Login failures are elevated"
          description: "Derived login-failure signals exceeded 10 in a 10-minute window."
          runbook: "docs/operations/runbooks/OBSERVABILITY_AND_RELIABILITY.md"
