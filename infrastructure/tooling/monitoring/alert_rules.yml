# Alert rules aligned to currently exposed API metrics

groups:
  - name: ecotrack.api.availability
    rules:
      - alert: EcoTrackApiDown
        expr: up{job="ecotrack-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EcoTrack API metrics target is down"
          description: "Prometheus cannot scrape the EcoTrack API metrics endpoint for over 1 minute."

  - name: ecotrack.frontend.ingestion
    rules:
      - alert: FrontendErrorIngestionSpike
        expr: rate(frontend_errors_total[5m]) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High frontend error ingestion rate"
          description: "Frontend error ingestion rate is above 0.2 events/second for 10 minutes."

      - alert: FrontendErrorBufferNearCapacity
        expr: frontend_error_buffer_size > 180
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frontend error buffer near capacity"
          description: "In-memory frontend error buffer is above 180 entries."

      - alert: FrontendMetricBufferNearCapacity
        expr: frontend_metric_buffer_size > 900
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frontend metric buffer near capacity"
          description: "In-memory frontend metric buffer is above 900 entries."

  - name: ecotrack.realtime.transports
    rules:
      - alert: RealtimeWebSocketAuthFailuresHigh
        expr: increase(ecotrack_realtime_connection_events_total{transport="ws",action="auth_failure"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket auth failure rate"
          description: "WebSocket realtime auth failures exceeded 20 in a 10-minute window."

      - alert: RealtimeNoPushConnections
        expr: sum(ecotrack_realtime_active_connections{transport=~"sse|ws"}) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No active realtime push connections"
          description: "No active SSE/WS realtime connections detected for 10 minutes."

      - alert: RealtimeEmittedEventsStalled
        expr: increase(ecotrack_realtime_emitted_events_total[15m]) == 0 and on() up{job="ecotrack-api"} == 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Realtime events stalled while API is up"
          description: "No realtime events emitted in the last 15 minutes while API targets are healthy."
